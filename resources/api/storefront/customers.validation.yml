post:
    email:
        - NotBlank:
              message: 'validation.not_blank'
        - Email:
              message: 'validation.email'

    salutation:
        - NotBlank:
              message: 'validation.not_blank'
        - Choice:
              choices: [Mr, Mrs, Dr, Ms, 'n/a']
              message: 'validation.choice'

    firstName:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 100
              maxMessage: 'validation.max_length.plural'

    lastName:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 100
              maxMessage: 'validation.max_length.plural'

    gender:
        - NotBlank:
              message: 'validation.not_blank'
        - Choice:
              choices: [Male, Female]
              message: 'validation.choice'

    password:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              min: 12
              max: 128
              minMessage: 'customer.password.error.min_length'
              maxMessage: 'customer.password.error.max_length'
        - Regex:
              pattern: '/^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*()\_\-\=\+\[\]\{\}\|;:<>.,\/?\\\~])[A-Za-z\d!@#$%^&*()\_\-\=\+\[\]\{\}\|;:<>.,\/?\\\~]+$/'
              message: 'global.password.invalid_password'
        - NotCompromisedPassword:
              message: 'This password has been compromised in a data breach. Please choose a different password.'

    confirmPassword:
        - NotBlank:
              message: 'validation.not_blank'
        - Expression:
              expression: 'this.password == this.confirmPassword'
              message: 'Passwords do not match'

    acceptedTerms:
        - NotNull:
              message: 'You must accept the terms and conditions to register'
        - IsTrue:
              message: 'You must accept the terms and conditions to register'

patch:
    email:
        - Optional:
              constraints:
                  - NotBlank:
                        message: 'validation.not_blank'
                  - Email:
                        message: 'validation.email'

    salutation:
        - Optional:
              constraints:
                  - NotBlank:
                        message: 'validation.not_blank'
                  - Choice:
                        choices: [Mr, Mrs, Dr, Ms, 'n/a']
                        message: 'validation.choice'

    firstName:
        - Optional:
              constraints:
                  - NotBlank:
                        message: 'validation.not_blank'
                  - Length:
                        max: 100
                        maxMessage: 'validation.max_length.plural'

    lastName:
        - Optional:
              constraints:
                  - NotBlank:
                        message: 'validation.not_blank'
                  - Length:
                        max: 100
                        maxMessage: 'validation.max_length.plural'

    gender:
        - Optional:
              constraints:
                  - NotBlank:
                        message: 'validation.not_blank'
                  - Choice:
                        choices: [Male, Female]
                        message: 'validation.choice'

    dateOfBirth:
        - Optional:
              constraints:
                  - Date:
                        message: 'Please provide a valid date in YYYY-MM-DD format'

    phone:
        - Optional:
              constraints:
                  - Length:
                        max: 255
                        maxMessage: 'validation.max_length.plural'

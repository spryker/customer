post:
    salutation:
        - NotBlank:
              message: 'validation.not_blank'
        - Choice:
              choices: ['Mr', 'Mrs', 'Dr', 'Ms', 'n/a']
              message: 'validation.choice'

    firstName:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 100
              maxMessage: 'validation.max_length.plural'

    lastName:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 100
              maxMessage: 'validation.max_length.plural'

    address1:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 255
              maxMessage: 'validation.max_length.plural'

    address2:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 255
              maxMessage: 'validation.max_length.plural'

    address3:
        - Optional:
              constraints:
                  - Length:
                        max: 255
                        maxMessage: 'validation.max_length.plural'

    city:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              min: 3
              max: 255
              minMessage: 'validation.min_length'
              maxMessage: 'validation.max_length.plural'

    zipCode:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              max: 15
              maxMessage: 'validation.max_length.plural'

    iso2Code:
        - NotBlank:
              message: 'validation.not_blank'
        - Length:
              min: 2
              max: 2
              minMessage: 'Country code must be exactly {{ limit }} characters'
              maxMessage: 'Country code must be exactly {{ limit }} characters'

    phone:
        - Optional:
              constraints:
                  - Length:
                        max: 255
                        maxMessage: 'validation.max_length.plural'

    company:
        - Optional:
              constraints:
                  - Length:
                        max: 255
                        maxMessage: 'validation.max_length.plural'

    comment:
        - Optional:
              constraints:
                  - Length:
                        max: 255
                        maxMessage: 'validation.max_length.plural'

    isDefaultShipping:
        - Optional:
              constraints:
                  - Type:
                        type: bool
                        message: 'isDefaultShipping must be a boolean value'

    isDefaultBilling:
        - Optional:
              constraints:
                  - Type:
                        type: bool
                        message: 'isDefaultBilling must be a boolean value'

